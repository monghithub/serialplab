version: '3.8'

services:
  postgres:
    image: postgres:16
    profiles: ["infra"]
    environment:
      POSTGRES_USER: serialplab
      POSTGRES_PASSWORD: serialplab
      POSTGRES_DB: serialplab
    ports:
      - "11010:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U serialplab"]
      interval: 5s
      timeout: 5s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    profiles: ["infra"]
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    ports:
      - "11020:2181"

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    profiles: ["infra"]
    depends_on:
      zookeeper:
        condition: service_started
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:9092,EXTERNAL://localhost:11021
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    ports:
      - "11021:9092"

  rabbitmq:
    image: rabbitmq:management
    profiles: ["infra"]
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "11022:5672"
      - "11023:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  nats:
    image: nats:latest
    profiles: ["infra"]
    command: ["--js", "--http_port", "8222"]
    ports:
      - "11024:4222"
      - "11025:8222"

  apicurio-registry:
    image: apicurio/apicurio-registry:2.6.2.Final
    profiles: ["infra"]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      REGISTRY_STORAGE_KIND: sql
      REGISTRY_STORAGE_SQL_KIND: postgresql
      REGISTRY_DATASOURCE_URL: jdbc:postgresql://postgres:5432/serialplab
      REGISTRY_DATASOURCE_USERNAME: serialplab
      REGISTRY_DATASOURCE_PASSWORD: serialplab
    ports:
      - "11011:8080"

volumes:
  postgres-data: