services:
  postgres:
    image: postgres:16
    profiles: ["infra"]
    environment:
      POSTGRES_USER: serialplab
      POSTGRES_PASSWORD: serialplab
      POSTGRES_DB: serialplab
    ports:
      - "11010:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./apicurio/init-registry-db.sql:/docker-entrypoint-initdb.d/01-init-registry-db.sql:ro
      - ./apicurio/init-service-schemas.sql:/docker-entrypoint-initdb.d/02-init-service-schemas.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U serialplab"]
      interval: 5s
      timeout: 5s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    profiles: ["infra"]
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      KAFKA_OPTS: "-Dzookeeper.4lw.commands.whitelist=ruok,srvr"
    ports:
      - "11020:2181"
    healthcheck:
      test: ["CMD-SHELL", "echo srvr | nc localhost 2181 | grep Zookeeper"]
      interval: 5s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    profiles: ["infra"]
    depends_on:
      zookeeper:
        condition: service_healthy
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:9092,EXTERNAL://localhost:11021
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    ports:
      - "11021:9092"
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

  rabbitmq:
    image: rabbitmq:management
    profiles: ["infra"]
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "11022:5672"
      - "11023:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  nats:
    image: nats:latest
    profiles: ["infra"]
    command: ["--js", "--http_port", "8222"]
    ports:
      - "11024:4222"
      - "11025:8222"
    healthcheck:
      test: ["NONE"]

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    profiles: ["infra"]
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_CLUSTERS_0_NAME: serialplab
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    ports:
      - "11026:8080"

  apicurio-registry:
    image: apicurio/apicurio-registry:3.1.7
    profiles: ["infra"]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      APICURIO_STORAGE_KIND: sql
      APICURIO_STORAGE_SQL_KIND: postgresql
      APICURIO_DATASOURCE_URL: jdbc:postgresql://postgres:5432/registry
      APICURIO_DATASOURCE_USERNAME: registry
      APICURIO_DATASOURCE_PASSWORD: registry
      QUARKUS_HTTP_PORT: 11011
    ports:
      - "11011:11011"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11011/health/ready"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  frontend-angular:
    build: ./frontend-angular
    profiles: ["app"]
    ports:
      - "11000:11000"
    depends_on:
      - service-springboot
      - service-quarkus
      - service-go
      - service-node

  service-springboot:
    build:
      context: .
      dockerfile: service-springboot/Dockerfile
    profiles: ["app"]
    ports:
      - "11001:11001"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/serialplab?currentSchema=springboot
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      NATS_URL: nats://nats:4222
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      nats:
        condition: service_started

  service-quarkus:
    build:
      context: .
      dockerfile: service-quarkus/Dockerfile
    profiles: ["app"]
    ports:
      - "11002:11002"
    environment:
      QUARKUS_DATASOURCE_JDBC_URL: jdbc:postgresql://postgres:5432/serialplab?currentSchema=quarkus
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      NATS_URL: nats://nats:4222
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      nats:
        condition: service_started

  service-go:
    build: ./service-go
    profiles: ["app"]
    ports:
      - "11003:11003"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      KAFKA_BROKERS: kafka:9092
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      NATS_URL: nats://nats:4222
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      nats:
        condition: service_started

  service-node:
    build: ./service-node
    profiles: ["app"]
    ports:
      - "11004:11004"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      KAFKA_BROKERS: kafka:9092
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      NATS_URL: nats://nats:4222
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      nats:
        condition: service_started

volumes:
  postgres-data: