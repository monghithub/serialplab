version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: myapp
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d myapp"]
      interval: 10s
      timeout: 5s
      retries: 5
    profiles:
      - infra

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    profiles:
      - infra

  frontend-angular:
    build: ./frontend-angular
    profiles: ["app"]
    ports:
      - "11000:11000"
    depends_on:
      - service-springboot
      - service-quarkus
      - service-go
      - service-node

  service-springboot:
    build: ./service-springboot
    profiles: ["app"]
    ports:
      - "11001:11001"
    depends_on:
      postgres:
        condition: service_healthy

  service-quarkus:
    build: ./service-quarkus
    profiles: ["app"]
    ports:
      - "11002:11002"
    depends_on:
      postgres:
        condition: service_healthy

  service-go:
    build: ./service-go
    profiles: ["app"]
    ports:
      - "11003:11003"
    depends_on:
      postgres:
        condition: service_healthy

  service-node:
    build: ./service-node
    profiles: ["app"]
    ports:
      - "11004:11004"
    depends_on:
      postgres:
        condition: service_healthy